name: Gerar Executável macOS (Compatibilidade Catalina)

on:
  push:
    branches: [ main ]

jobs:
  build:
    # Usamos o macos-11 para garantir suporte ao macOS 10.15
    runs-on: macos-11

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        pip install customtkinter openpyxl pandas pyinstaller

    - name: Gerar Executável com PyInstaller
      env:
        # Força a compilação a ser compatível com a versão do teu utilizador
        MACOSX_DEPLOYMENT_TARGET: 10.15
      run: |
        pyinstaller --windowed --noconsole --onefile \
        --collect-all customtkinter \
        --icon=app.icns \
        app.py

    - name: Guardar Executável (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Sistema-Mac-Catalina
        path: dist/
