name: Gerar Executável macOS

on:
  push:
    branches: [ main ]  # O build corre sempre que enviares código para a branch main

jobs:
  build:
    runs-on: macos-latest  # Utiliza um ambiente macOS real na nuvem

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        pip install customtkinter openpyxl pandas pyinstaller

    - name: Gerar Executável com PyInstaller
      run: |
        # Gerar o executável único
        pyinstaller --windowed --noconsole --onefile \
        --collect-all customtkinter \
        --icon=app.icns \
        app.py

    - name: Guardar Executável (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Sistema-Mac-Final
        path: dist/  # Alterado para 'dist/' para capturar tudo o que foi gerado
