name: Gerar Executável macOS (Compatível)

on:
  push:
    branches: [ main ]

jobs:
  build:
    # Alteramos para macos-13, que ainda suporta builds para sistemas Intel/Catalina
    runs-on: macos-13

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        pip install customtkinter openpyxl pandas pyinstaller

    - name: Gerar Executável com PyInstaller
      env:
        # Esta linha é o segredo: diz ao compilador para suportar o macOS 10.15
        MACOSX_DEPLOYMENT_TARGET: 10.15
      run: |
        pyinstaller --windowed --noconsole --onefile \
        --collect-all customtkinter \
        --icon=app.icns \
        app.py

    - name: Guardar Executável (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Sistema-Mac-Catalina
        path: dist/
